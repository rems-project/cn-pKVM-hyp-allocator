name: CN verify check

on:
  pull_request:
  push:
    branches:
      - main
      - ci

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        ocaml: [5.2.0]

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4

      - name: Checkout CN repository
        uses: actions/checkout@v4
        with:
          repository: rems-project/cn
          path: cn

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libgmp-dev pkg-config z3 opam git make wget unzip

      - name: Restore OPAM cache
        id: cache-opam
        uses: actions/cache@v4
        with:
          path: |
            ~/.opam
            ~/.cache/opam
          key: ${{ runner.os }}-ocaml-${{ matrix.ocaml }}-cn-${{ hashFiles('cn/cn.opam') }}

      - name: Initialize OPAM & install CN
        shell: bash
        run: |
          opam init --yes --compiler=${{ matrix.ocaml }}
          eval $(opam env)
          cd cn
          opam install --yes --deps-only ./cn.opam ocamlformat.0.27.0
          make install

      - name: Save OPAM cache
        if: steps.cache-opam.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.opam
            ~/.cache/opam
          key: ${{ runner.os }}-ocaml-${{ matrix.ocaml }}-cn-${{ hashFiles('cn/cn.opam') }}

      - name: Verify setup_first_chunk
        shell: bash
        run: |
          # switch to the compiler we just initialized
          opam switch "${{ matrix.ocaml }}"
          eval $(opam env)

          # run verify in the ROOT of your repo (where your Makefile.cn-verify lives)
          make ONLY=setup_first_chunk cn-verify | tee cn-verify.log

          # fail if the test didn’t pass
          grep -q '\[1/1\]: setup_first_chunk -- pass' cn-verify.log

