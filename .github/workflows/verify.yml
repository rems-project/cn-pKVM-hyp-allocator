jobs:
  verify:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        ocaml: [5.2.0]
        targets:
          - chunk_unmapped_size
          - setup_first_chunk
          - chunk_inc_map
          - chunk_install
    steps:
      - uses: actions/checkout@v4

      - name: Checkout CN repository at fixed commit
        uses: actions/checkout@v4
        with:
          repository: rems-project/cn
          path: cn
          ref: ${{ env.CN_COMMIT }}

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.opam
            ~/.cache/opam
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: ${{ runner.os }}-cn-${{ matrix.ocaml }}-${{ env.CN_COMMIT }}

      - name: Install system deps & build CN (on cache miss)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libgmp-dev pkg-config z3 opam git make wget unzip
          opam init --yes --compiler=${{ matrix.ocaml }}
          eval $(opam env)
          cd cn
          opam install --yes --deps-only ./cn.opam ocamlformat.0.27.0
          make install

      - name: Initialise opam (on cache hit)
        if: steps.cache-deps.outputs.cache-hit == 'true'
        run: |
          opam init --reinit --disable-sandboxing --yes --compiler=${{ matrix.ocaml }}

      - name: Verify ${{ matrix.targets }}
        run: |
          opam switch "${{ matrix.ocaml }}"
          eval $(opam env)
          make ONLY=${{ matrix.targets }} cn-verify

